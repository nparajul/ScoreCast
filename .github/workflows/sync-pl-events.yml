name: Sync PL Events

on:
  workflow_dispatch:

env:
  API_BASE_URL: ${{ secrets.SCORECAST_API_URL }}
  API_KEY: ${{ secrets.SCORECAST_API_KEY }}

jobs:
  sync-pl-events:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up API
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$API_BASE_URL/api/v1/health/")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && break
            sleep 15
          done
          [ "$STATUS" = "200" ] || { echo "::error::API did not wake up"; exit 1; }

      - name: Sync FPL data
        run: |
          RESULT=$(curl -s --max-time 120 -X POST -H "X-Api-Key: $API_KEY" -H "Content-Type: application/json" \
            -d '{"competitionCode":"PL","appName":"GITHUB-ACTIONS:SYNC-PL-EVENTS"}' \
            "$API_BASE_URL/api/v1/master-data/sync/fpl")
          echo "FPL sync: $(echo "$RESULT" | jq -r '.message // empty' 2>/dev/null)"

      - name: Sync Pulse events (batched)
        run: |
          while true; do
            RESULT=$(curl -s --max-time 120 -X POST -H "X-Api-Key: $API_KEY" -H "Content-Type: application/json" \
              -d '{"competitionCode":"PL","batchSize":50,"appName":"GITHUB-ACTIONS:SYNC-PL-EVENTS"}' \
              "$API_BASE_URL/api/v1/master-data/sync/pulse-events")
            COMPLETE=$(echo "$RESULT" | jq -r '.data.complete // "true"' 2>/dev/null)
            PROCESSED=$(echo "$RESULT" | jq -r '.data.processed // "0"' 2>/dev/null)
            echo "Processed: $PROCESSED, Complete: $COMPLETE"
            [ "$COMPLETE" = "true" ] || [ "$PROCESSED" = "0" ] && break
            sleep 1
          done
