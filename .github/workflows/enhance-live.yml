name: Enhance Live Matches

on:
  schedule:
    - cron: '*/2 12-23 * * *'
  workflow_dispatch:

env:
  API_BASE_URL: ${{ secrets.SCORECAST_API_URL }}
  API_KEY: ${{ secrets.SCORECAST_API_KEY }}

jobs:
  enhance-live:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up API
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$API_BASE_URL/api/v1/health/")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then break; fi
            sleep 15
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::API did not wake up"
            exit 1
          fi

      - name: Enhance all current seasons
        run: |
          # Call without seasonId — handler processes all current seasons in one go
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 180 -X POST \
              -H "X-Api-Key: $API_KEY" -H "Content-Type: application/json" \
              -d '{"appName":"GITHUB-ACTIONS:ENHANCE-LIVE"}' \
              "$API_BASE_URL/api/v1/master-data/enhance-live")
            RESULT=$(cat /tmp/response.json)
            SUCCESS=$(echo "$RESULT" | jq -r '.success // false' 2>/dev/null)
            MSG=$(echo "$RESULT" | jq -r '.message // empty' 2>/dev/null)
            echo "Attempt $i: HTTP $HTTP_CODE success=$SUCCESS message=$MSG"
            if [ "$SUCCESS" = "true" ]; then break; fi
            sleep 5
          done
          if [ "$SUCCESS" != "true" ]; then
            echo "::warning::enhance-live did not succeed: $MSG"
          fi
