name: Deploy Web to Cloudflare Pages

on:
  push:
    branches: [cloudfare-dev]
    paths:
      - 'src/Web/**'
      - 'src/Shared/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish WASM
        run: dotnet publish src/Web/ScoreCast.Web/ScoreCast.Web.csproj -c Release -o output

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy output/wwwroot --project-name=scorecast-92u --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
