<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScoreCast</title>
    <base href="/" />
    <link rel="icon" type="image/svg+xml" href="scorecast-icon.svg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ScoreCast" />
    <meta name="theme-color" content="#0A1929" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css?v=2" rel="stylesheet" />
</head>
<body style="margin:0;">
    <div id="app">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Roboto,sans-serif;">
            <img src="scorecast-icon.svg" alt="ScoreCast" width="80" height="80" style="animation:pulse 1.5s ease-in-out infinite;" />
            <img src="scorecast-logo.svg" alt="ScoreCast" width="280" style="margin-top:1rem;" />
        </div>
        <style>@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.95)}}</style>
    </div>
    <script type="module" src="js/firebase-auth.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/bracket-lines.js"></script>
    <script>
        navigator.serviceWorker.register('service-worker.js').then(reg => {
            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'activated' && navigator.serviceWorker.controller && !sessionStorage.getItem('sw-updated')) {
                        sessionStorage.setItem('sw-updated', '1');
                        location.reload();
                    }
                });
            });
        });
    </script>
</body>
</html>
